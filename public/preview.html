<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Battle Plan — Preview</title>
    <style>
      html,body{margin:0;height:100%;background:#1d1916;color:#f3ede3;
        font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
      .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
      .badge{width:46px;height:46px;border-radius:13px;background:#3a2b24;display:flex;align-items:center;justify-content:center;
        animation:bob 1.6s ease-in-out infinite;}
      @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
      p{font-size:13px;color:#b3a99c;margin:0;}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="badge">
        <svg viewBox="0 0 48 48" width="30" height="30"><circle cx="15" cy="13.5" r="5" fill="#a07a4f"/><circle cx="33" cy="13.5" r="5" fill="#a07a4f"/><ellipse cx="24" cy="26" rx="15" ry="13" fill="#b88c5c"/><ellipse cx="24" cy="31" rx="8" ry="6.4" fill="#d2a674"/><circle cx="18.4" cy="23" r="1.9" fill="#2b2620"/><circle cx="29.6" cy="23" r="1.9" fill="#2b2620"/><ellipse cx="24" cy="29" rx="2.2" ry="1.5" fill="#5a4632"/></svg>
      </div>
      <p>Loading the redesign…</p>
    </div>
    <script>
      // No password. Just clear the service worker (it was hijacking the
      // navigation) and load the design straight from the network.
      (async function () {
        try {
          if ('serviceWorker' in navigator) {
            var regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(function (r) { return r.unregister(); }));
          }
          if (window.caches) {
            var keys = await caches.keys();
            await Promise.all(keys.map(function (k) { return caches.delete(k); }));
          }
        } catch (e) {}
        location.replace('/bp-next.html?v=' + Date.now());
      })();
    </script>
  </body>
</html>
