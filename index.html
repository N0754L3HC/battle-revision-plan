<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/caps.svg" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Battle Plan" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#0d0f14" />
    <!-- Paint the document before React mounts so there is never a white flash,
         nor a white layer peeking behind the themed app on overscroll. -->
    <style>html,body{margin:0;background:#f4eee3;overscroll-behavior:none}</style>

    <!-- Font: Inter, single family across the whole app (Notion-style) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <title>Battle Plan — Free GCSE &amp; A-Level Revision Tracker</title>
    <link rel="canonical" href="https://beattheexam.org/" />
    <meta name="description" content="Track every past paper. See exactly where you're losing marks. Free revision tracker for UK GCSE &amp; A-Level students. Free during beta — no credit card." />

    <!-- Open Graph (WhatsApp, iMessage, Discord, Slack) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://beattheexam.org/" />
    <meta property="og:site_name"   content="Battle Plan" />
    <meta property="og:title"       content="Battle Plan — Free GCSE &amp; A-Level Revision Tracker" />
    <meta property="og:description" content="Know exactly where you're losing marks. Log past papers, track your grade, spot weak topics. Free for UK GCSE &amp; A-Level students." />
    <meta property="og:image"       content="https://beattheexam.org/og.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="Battle Plan — revision tracker screenshot" />

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Battle Plan — Free GCSE &amp; A-Level Revision Tracker" />
    <meta name="twitter:description" content="Know exactly where you're losing marks. Log past papers, track your grade, spot weak topics. Free for UK GCSE &amp; A-Level students." />
    <meta name="twitter:image"       content="https://beattheexam.org/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
